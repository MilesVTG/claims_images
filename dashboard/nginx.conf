server {
    listen 8080;
    server_name _;

    # React SPA — serve static files, fall back to index.html for client routes
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Internal API (FastAPI on Cloud Run)
    location /api/ {
        proxy_pass ${API_SERVICE_URL}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # External portal endpoints (future)
    location /external/ {
        proxy_pass ${API_SERVICE_URL}/external/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
